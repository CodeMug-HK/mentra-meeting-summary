<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Summary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
    .status {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .status-title { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
    .status-value { font-size: 18px; font-weight: 600; }
    .green { color: #4ade80; }
    .blue { color: #60a5fa; }
    .commands {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .commands h2 { font-size: 16px; margin-bottom: 12px; }
    .cmd {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #222;
    }
    .cmd:last-child { border: none; }
    .cmd-voice { color: #4ade80; font-weight: 500; }
    .cmd-action { color: #888; font-size: 14px; }
    .btn-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #222;
    }
    .btn-row:last-child { border: none; }
    .btn-label { color: #60a5fa; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Meeting Summary</h1>
    <p class="subtitle">AI-powered meeting notes for Mentra Live</p>

    <div class="status">
      <div class="status-title">Status</div>
      <div class="status-value green">Ready</div>
    </div>

    <div class="commands">
      <h2>Voice Commands</h2>
      <div class="cmd">
        <span class="cmd-voice">"Start Meeting"</span>
        <span class="cmd-action">Begin recording</span>
      </div>
      <div class="cmd">
        <span class="cmd-voice">"Stop Meeting"</span>
        <span class="cmd-action">Stop recording</span>
      </div>
      <div class="cmd">
        <span class="cmd-voice">"Meeting Status"</span>
        <span class="cmd-action">Hear stats</span>
      </div>
      <div class="cmd">
        <span class="cmd-voice">"Summarize"</span>
        <span class="cmd-action">Generate summary</span>
      </div>
    </div>

    <div class="commands">
      <h2>Button Controls</h2>
      <div class="btn-row">
        <span class="btn-label">Short press</span>
        <span class="cmd-action">Start / Stop recording</span>
      </div>
      <div class="btn-row">
        <span class="btn-label">Long press</span>
        <span class="cmd-action">Generate summary</span>
      </div>
    </div>
  </div>
</body>
</html>
